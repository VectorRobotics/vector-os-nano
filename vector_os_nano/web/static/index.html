<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Vector OS Nano</title>
<style>
  :root {
    --bg: #08080d;
    --surface: #0f0f18;
    --surface-hover: #161625;
    --surface-border: rgba(255,255,255,0.04);
    --primary: #00b4b4;
    --primary-dim: #008888;
    --primary-glow: rgba(0,180,180,0.12);
    --success: #00c853;
    --error: #ff5252;
    --warning: #ffab40;
    --text: #d8d8e0;
    --text-dim: #6a6a80;
    --text-muted: #40405a;
    --user-bubble: #0d2a3a;
    --ai-bubble: #141420;
    --font: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', system-ui, sans-serif;
    --mono: 'JetBrains Mono', 'Fira Code', 'SF Mono', Consolas, monospace;
    --radius: 12px;
    --radius-sm: 8px;
  }

  * { margin:0; padding:0; box-sizing:border-box; }

  body {
    font-family: var(--font);
    background: var(--bg);
    color: var(--text);
    height: 100vh;
    overflow: hidden;
  }

  /* ─── Header ─── */
  .header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 12px 24px;
    background: var(--surface);
    border-bottom: 1px solid var(--surface-border);
  }
  .header-logo {
    display: flex;
    align-items: center;
    gap: 12px;
  }
  .header-logo svg { width: 28px; height: 28px; }
  .header-title {
    font-size: 16px;
    font-weight: 600;
    letter-spacing: 0.5px;
    color: var(--primary);
  }
  .header-subtitle {
    font-size: 11px;
    color: var(--text-dim);
    letter-spacing: 1px;
    text-transform: uppercase;
  }
  .header-badges {
    display: flex;
    gap: 8px;
    align-items: center;
  }
  .badge {
    font-size: 11px;
    padding: 3px 10px;
    border-radius: 20px;
    font-weight: 500;
    letter-spacing: 0.3px;
  }
  .badge-sim { background: rgba(0,180,180,0.15); color: var(--primary); }
  .badge-connected { background: rgba(0,200,83,0.15); color: var(--success); }
  .badge-disconnected { background: rgba(255,82,82,0.15); color: var(--error); }

  /* ─── Main Layout ─── */
  .main {
    display: grid;
    grid-template-columns: 1fr 380px;
    height: calc(100vh - 52px);
    gap: 0;
  }

  /* ─── Chat Panel ─── */
  .chat-panel {
    display: flex;
    flex-direction: column;
    border-right: 1px solid var(--surface-border);
  }
  .chat-messages {
    flex: 1;
    overflow-y: auto;
    padding: 20px 24px;
    display: flex;
    flex-direction: column;
    gap: 16px;
  }
  .chat-messages::-webkit-scrollbar { width: 4px; }
  .chat-messages::-webkit-scrollbar-thumb { background: var(--text-muted); border-radius: 4px; }

  .msg {
    max-width: 80%;
    padding: 12px 16px;
    border-radius: var(--radius);
    font-size: 14px;
    line-height: 1.6;
    animation: fadeIn 0.3s ease;
  }
  @keyframes fadeIn { from { opacity:0; transform:translateY(8px); } to { opacity:1; transform:translateY(0); } }

  .msg-user {
    align-self: flex-end;
    background: var(--user-bubble);
    border: 1px solid rgba(0,180,180,0.2);
    border-bottom-right-radius: 4px;
  }
  .msg-ai {
    align-self: flex-start;
    background: var(--ai-bubble);
    border: 1px solid var(--surface-border);
    border-bottom-left-radius: 4px;
  }
  .msg-system {
    align-self: center;
    background: transparent;
    border: 1px solid var(--surface-border);
    color: var(--text-dim);
    font-size: 12px;
    padding: 6px 14px;
    border-radius: 20px;
  }
  .msg-executing {
    align-self: center;
    background: rgba(0,180,180,0.06);
    border: 1px solid rgba(0,180,180,0.15);
    color: var(--primary);
    font-size: 13px;
    font-family: var(--mono);
    padding: 8px 16px;
  }
  .msg-result {
    align-self: center;
    font-size: 12px;
    padding: 6px 14px;
    border-radius: 20px;
  }
  .msg-result.success { background: rgba(0,200,83,0.1); border: 1px solid rgba(0,200,83,0.2); color: var(--success); }
  .msg-result.failed { background: rgba(255,82,82,0.1); border: 1px solid rgba(255,82,82,0.2); color: var(--error); }

  .msg-label {
    font-size: 11px;
    font-weight: 600;
    margin-bottom: 4px;
    text-transform: uppercase;
    letter-spacing: 0.5px;
  }
  .msg-user .msg-label { color: var(--primary); }
  .msg-ai .msg-label { color: var(--text-dim); }

  /* ─── Chat Input ─── */
  .chat-input-bar {
    padding: 16px 24px;
    background: var(--surface);
    border-top: 1px solid var(--surface-border);
  }
  .chat-input-wrap {
    display: flex;
    gap: 8px;
    align-items: center;
    background: var(--bg);
    border: 1px solid var(--surface-border);
    border-radius: var(--radius);
    padding: 4px 4px 4px 16px;
    transition: border-color 0.2s;
  }
  .chat-input-wrap:focus-within {
    border-color: var(--primary);
    box-shadow: 0 0 0 3px var(--primary-glow);
  }
  .chat-input {
    flex: 1;
    background: none;
    border: none;
    color: var(--text);
    font-size: 14px;
    font-family: var(--font);
    outline: none;
    padding: 8px 0;
  }
  .chat-input::placeholder { color: var(--text-muted); }
  .chat-send {
    background: var(--primary);
    border: none;
    color: #fff;
    width: 36px;
    height: 36px;
    border-radius: var(--radius-sm);
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    transition: background 0.2s, transform 0.1s;
  }
  .chat-send:hover { background: #00cccc; }
  .chat-send:active { transform: scale(0.95); }
  .chat-send:disabled { opacity: 0.3; cursor: not-allowed; }

  /* ─── Status Panel ─── */
  .status-panel {
    display: flex;
    flex-direction: column;
    gap: 0;
    overflow-y: auto;
    padding: 16px;
    background: var(--bg);
  }
  .status-panel::-webkit-scrollbar { width: 4px; }
  .status-panel::-webkit-scrollbar-thumb { background: var(--text-muted); border-radius: 4px; }

  .card {
    background: var(--surface);
    border: 1px solid var(--surface-border);
    border-radius: var(--radius);
    padding: 16px;
    margin-bottom: 12px;
  }
  .card-title {
    font-size: 11px;
    font-weight: 600;
    color: var(--text-dim);
    text-transform: uppercase;
    letter-spacing: 1px;
    margin-bottom: 12px;
    display: flex;
    align-items: center;
    gap: 6px;
  }
  .card-title::before {
    content: '';
    width: 6px;
    height: 6px;
    border-radius: 50%;
    background: var(--primary);
  }

  /* Joint angles */
  .joint-row {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 4px 0;
    font-family: var(--mono);
    font-size: 12px;
  }
  .joint-name { color: var(--text-dim); }
  .joint-value { color: var(--text); font-weight: 500; }
  .joint-bar {
    flex: 1;
    height: 3px;
    background: var(--surface-hover);
    border-radius: 2px;
    margin: 0 10px;
    position: relative;
  }
  .joint-bar-fill {
    position: absolute;
    top: 0;
    left: 50%;
    height: 100%;
    background: var(--primary);
    border-radius: 2px;
    transition: width 0.3s, left 0.3s;
  }

  /* Objects */
  .object-row {
    display: flex;
    align-items: center;
    gap: 8px;
    padding: 5px 0;
    font-size: 13px;
  }
  .object-dot {
    width: 8px;
    height: 8px;
    border-radius: 50%;
    flex-shrink: 0;
  }
  .object-name { flex: 1; }
  .object-pos { font-family: var(--mono); font-size: 11px; color: var(--text-dim); }

  /* Command history */
  .history-row {
    display: flex;
    align-items: center;
    gap: 8px;
    padding: 4px 0;
    font-size: 12px;
  }
  .history-icon { font-size: 14px; }
  .history-text { flex: 1; color: var(--text); }
  .history-time { font-family: var(--mono); font-size: 11px; color: var(--text-dim); }

  /* ─── Animations ─── */
  .typing-dots::after {
    content: '';
    animation: dots 1.5s infinite;
  }
  @keyframes dots {
    0%, 20% { content: '.'; }
    40% { content: '..'; }
    60%, 100% { content: '...'; }
  }

  /* ─── Responsive ─── */
  @media (max-width: 900px) {
    .main { grid-template-columns: 1fr; }
    .status-panel { display: none; }
  }
</style>
</head>
<body>

<!-- Header -->
<div class="header">
  <div class="header-logo">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" style="color:var(--primary)">
      <path d="M12 2L2 19h20L12 2z"/>
    </svg>
    <div>
      <div class="header-title">VECTOR OS NANO</div>
      <div class="header-subtitle">AI Robot Control Dashboard</div>
    </div>
  </div>
  <div class="header-badges">
    <span id="badge-mode" class="badge badge-sim">SIM</span>
    <span id="badge-conn" class="badge badge-connected">Connected</span>
  </div>
</div>

<!-- Main -->
<div class="main">
  <!-- Chat Panel -->
  <div class="chat-panel">
    <div class="chat-messages" id="chat-messages"></div>
    <div class="chat-input-bar">
      <div class="chat-input-wrap">
        <input type="text" class="chat-input" id="chat-input"
               placeholder="Type a message or robot command..."
               autocomplete="off" autofocus>
        <button class="chat-send" id="chat-send" title="Send">
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5">
            <path d="M22 2L11 13M22 2L15 22L11 13L2 9L22 2Z"/>
          </svg>
        </button>
      </div>
    </div>
  </div>

  <!-- Status Panel -->
  <div class="status-panel">
    <!-- Arm Status -->
    <div class="card">
      <div class="card-title">Arm Status</div>
      <div id="joint-list"></div>
      <div class="joint-row" style="margin-top:8px; border-top: 1px solid var(--surface-border); padding-top: 8px;">
        <span class="joint-name">Gripper</span>
        <span class="joint-value" id="gripper-state">--</span>
      </div>
    </div>

    <!-- Objects -->
    <div class="card">
      <div class="card-title">Objects on Table</div>
      <div id="object-list"></div>
    </div>

    <!-- Command History -->
    <div class="card">
      <div class="card-title">Command History</div>
      <div id="history-list">
        <div style="color:var(--text-muted); font-size:12px;">No commands yet</div>
      </div>
    </div>
  </div>
</div>

<script>
const COLORS = {
  banana: '#f0d020', mug: '#d43030', bottle: '#3070d0',
  screwdriver: '#30a040', duck: '#e08020', lego: '#e03030',
  red: '#d43030', blue: '#3070d0', green: '#30a040',
  yellow: '#f0d020', orange: '#e08020', white: '#c0c0c0',
};

// ─── WebSocket Setup ───
let chatWs = null;
let statusWs = null;
let busy = false;

function connectChat() {
  chatWs = new WebSocket(`ws://${location.host}/ws/chat`);
  chatWs.onmessage = (e) => {
    const msg = JSON.parse(e.data);
    if (msg.type === 'response') addMessage('ai', msg.content);
    else if (msg.type === 'executing') addMessage('executing', msg.content);
    else if (msg.type === 'command_result') {
      const r = msg.result;
      addMessage('result', `${r.status === 'success' ? 'OK' : 'FAILED'} — ${r.text} (${r.duration}s)`, r.status);
      busy = false;
      updateSendBtn();
    }
  };
  chatWs.onclose = () => setTimeout(connectChat, 2000);
  chatWs.onerror = () => chatWs.close();
}

function connectStatus() {
  statusWs = new WebSocket(`ws://${location.host}/ws/status`);
  statusWs.onmessage = (e) => {
    const s = JSON.parse(e.data);
    updateStatus(s);
  };
  statusWs.onclose = () => {
    document.getElementById('badge-conn').className = 'badge badge-disconnected';
    document.getElementById('badge-conn').textContent = 'Disconnected';
    setTimeout(connectStatus, 2000);
  };
  statusWs.onerror = () => statusWs.close();
}

// ─── Chat Messages ───
function addMessage(type, content, status) {
  const container = document.getElementById('chat-messages');
  const div = document.createElement('div');

  if (type === 'user') {
    div.className = 'msg msg-user';
    div.innerHTML = `<div class="msg-label">You</div>${escHtml(content)}`;
  } else if (type === 'ai') {
    div.className = 'msg msg-ai';
    div.innerHTML = `<div class="msg-label">Vector AI</div>${escHtml(content)}`;
  } else if (type === 'executing') {
    div.className = 'msg msg-executing';
    div.innerHTML = `<span class="typing-dots">${escHtml(content)}</span>`;
  } else if (type === 'result') {
    div.className = `msg msg-result ${status === 'success' ? 'success' : 'failed'}`;
    div.textContent = content;
  } else {
    div.className = 'msg msg-system';
    div.textContent = content;
  }

  container.appendChild(div);
  container.scrollTop = container.scrollHeight;
}

function escHtml(s) {
  const d = document.createElement('div');
  d.textContent = s;
  return d.innerHTML;
}

// ─── Send Message ───
function sendMessage() {
  const input = document.getElementById('chat-input');
  const text = input.value.trim();
  if (!text || !chatWs || chatWs.readyState !== 1) return;

  addMessage('user', text);
  chatWs.send(JSON.stringify({ type: 'message', content: text }));
  input.value = '';
  busy = true;
  updateSendBtn();
}

function updateSendBtn() {
  document.getElementById('chat-send').disabled = busy;
}

// ─── Status Updates ───
function updateStatus(s) {
  // Mode badge
  const modeBadge = document.getElementById('badge-mode');
  modeBadge.textContent = s.mode === 'sim' ? 'SIM' : 'REAL';
  modeBadge.className = 'badge badge-sim';

  // Connection badge
  const connBadge = document.getElementById('badge-conn');
  if (s.arm && s.arm.connected) {
    connBadge.textContent = 'Connected';
    connBadge.className = 'badge badge-connected';
  } else {
    connBadge.textContent = 'Disconnected';
    connBadge.className = 'badge badge-disconnected';
  }

  // Joint angles
  if (s.arm && s.arm.joints.length > 0) {
    const jl = document.getElementById('joint-list');
    jl.innerHTML = s.arm.joint_names.map((name, i) => {
      const val = s.arm.joints[i];
      const pct = ((val + 3.14) / 6.28) * 100;
      const w = Math.abs(val / 3.14) * 50;
      const left = val >= 0 ? 50 : 50 - w;
      return `<div class="joint-row">
        <span class="joint-name" style="width:110px">${name}</span>
        <div class="joint-bar"><div class="joint-bar-fill" style="left:${left}%;width:${w}%"></div></div>
        <span class="joint-value" style="width:55px;text-align:right">${val.toFixed(2)}</span>
      </div>`;
    }).join('');

    document.getElementById('gripper-state').textContent = s.arm.gripper;
  }

  // Objects
  if (s.objects) {
    const ol = document.getElementById('object-list');
    if (s.objects.length === 0) {
      ol.innerHTML = '<div style="color:var(--text-muted);font-size:12px">No objects</div>';
    } else {
      ol.innerHTML = s.objects.map(o => {
        const color = COLORS[o.name] || COLORS[o.name.split('_')[0]] || '#888';
        const pos = o.position;
        return `<div class="object-row">
          <div class="object-dot" style="background:${color}"></div>
          <span class="object-name">${o.name}</span>
          <span class="object-pos">(${pos[0].toFixed(2)}, ${pos[1].toFixed(2)})</span>
        </div>`;
      }).join('');
    }
  }

  // History
  if (s.last_command) {
    updateHistory(s.last_command);
  }
}

const seenCommands = new Set();
function updateHistory(cmd) {
  const key = `${cmd.text}-${cmd.duration}`;
  if (seenCommands.has(key)) return;
  seenCommands.add(key);

  const hl = document.getElementById('history-list');
  if (hl.querySelector('[style]')) hl.innerHTML = '';

  const icon = cmd.status === 'success' ? '&#10003;' : '&#10007;';
  const color = cmd.status === 'success' ? 'var(--success)' : 'var(--error)';
  const div = document.createElement('div');
  div.className = 'history-row';
  div.innerHTML = `<span class="history-icon" style="color:${color}">${icon}</span>
    <span class="history-text">${escHtml(cmd.text)}</span>
    <span class="history-time">${cmd.duration}s</span>`;
  hl.prepend(div);
}

// ─── Event Listeners ───
document.getElementById('chat-input').addEventListener('keydown', (e) => {
  if (e.key === 'Enter' && !e.shiftKey) {
    e.preventDefault();
    sendMessage();
  }
});
document.getElementById('chat-send').addEventListener('click', sendMessage);

// ─── Connect ───
connectChat();
connectStatus();
</script>
</body>
</html>
