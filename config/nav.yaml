# Navigation parameters — tunable without code changes
navigation:
  ceiling_filter_height: 1.8     # meters, points above this filtered from /registered_scan
  arrival_radius: 0.8            # meters, consider arrived when closer than this
  far_probe_timeout: 3.0         # seconds, wait for FAR response before fallback
  waypoint_timeout: 30.0         # seconds, per-waypoint timeout in door-chain
  stall_threshold: 0.3           # meters, minimum progress per stuck check interval
  stall_timeout: 30.0            # seconds, abort if no progress for this long
  wall_escape_duration: 2.5      # seconds, reverse + strafe escape maneuver

exploration:
  progress_interval: 5.0         # seconds, minimum interval between progress reports
  seed_walk_duration: 2.0        # seconds, initial forward walk before TARE starts
  seed_walk_speed: 0.3           # m/s
